name: Deploy Project on Server
on:
  workflow_run:
    workflows: ["Build and push Docker images"]
    types:
      - completed
    branches:
      - main
      - develop

env:
  DOCKER_IMAGE: personal-project-frontend
  IMAGE_TAG_DEV: dev
  IMAGE_TAG_PROD: latest

jobs:
  deploy-dev:
    # Deploy del entorno de desarrollo (solo rama develop)
    if: ${{ github.event.workflow_run.head_branch == 'develop' && github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    steps:
      - name: Descargar el repositorio (para leer el docker-compose)
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2
        with:
          version: latest

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Download image and deploy
        env:
          DOCKER_USERNAME: carlosrauda64
          DOCKER_IMAGE: ${{ env.DOCKER_IMAGE }}
          IMAGE_TAG_DEV: ${{ env.IMAGE_TAG_DEV }}
        run: |
          docker compose --profile dev pull
          docker compose --profile dev up -d --remove-orphans

  deploy-prod:
    # Deploy del entorno de producción (solo rama main)
    if: ${{ github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    steps:
      - name: Descargar el repositorio (para leer el docker-compose)
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2
        with:
          version: latest

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Download image and deploy
        env:
          DOCKER_USERNAME: carlosrauda64
          DOCKER_IMAGE: ${{ env.DOCKER_IMAGE }}
          IMAGE_TAG_PROD: ${{ env.IMAGE_TAG_PROD }}
        run: |
          docker compose --profile prod pull
          docker compose --profile prod up -d --remove-orphans
