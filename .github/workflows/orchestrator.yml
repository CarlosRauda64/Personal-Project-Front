name: CI/CD Pipeline
on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  # Etapa 1: Escaneo de vulnerabilidades + build de Node
  build-node:
    uses: ./.github/workflows/build.yml

  # Etapa 2: Build y push de la imagen Docker (:dev o :latest segun la rama)
  build-docker:
    needs: build-node
    uses: ./.github/workflows/docker_build.yml
    secrets: inherit

  # Etapa 3: Deploy en el servidor (profile dev o prod segun la rama)
  deploy-server:
    needs: build-docker
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
