name: Build and push Docker images
# Workflow reutilizable: lo invoca el orquestador (cicd.yml)
# github.ref_name es la rama que disparo el orquestador (main o develop)
on:
  workflow_call:

jobs:
  docker-dev:
    # Publica la imagen :dev solo cuando la rama origen es develop
    if: ${{ github.ref_name == 'develop' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: carlosrauda64
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build and push (dev)
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: true
          tags: carlosrauda64/personal-project-frontend:dev

  docker-prod:
    # Publica la imagen :latest solo cuando la rama origen es main
    if: ${{ github.ref_name == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: carlosrauda64
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build and push (prod)
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: true
          tags: carlosrauda64/personal-project-frontend:latest
