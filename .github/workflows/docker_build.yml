name: Build and push Docker images
on:
  workflow_run:
    workflows: ["Build project NodeJS"]
    types:
      - completed
    branches:
      - main
      - develop

jobs:
  docker-dev:
    # Publica la imagen :dev solo cuando la rama origen es develop
    if: ${{ github.event.workflow_run.head_branch == 'develop' && github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build and push (dev)
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: true
          tags: carlosrauda64/personal-project-frontend:dev

  docker-prod:
    # Publica la imagen :latest solo cuando la rama origen es main
    if: ${{ github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build and push (prod)
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: true
          tags: carlosrauda64/personal-project-frontend:latest
